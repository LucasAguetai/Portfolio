<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — command not found</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='72' font-family='Menlo,Consolas,monospace' font-size='72' font-weight='bold' text-anchor='middle'%3E%3Ctspan fill='%234ade80'%3E%3E%3C/tspan%3E%3Ctspan fill='%2322d3ee'%3E_%3C/tspan%3E%3C/text%3E%3C/svg%3E">
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 24px;
    }
    .page-404 .terminal {
      width: min(640px, 100%);
      transform: none;
    }
    .page-404 .terminal-body { min-height: 0; white-space: normal; }
    .err-code {
      font-size: clamp(4rem, 12vw, 7rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
    }
  </style>
</head>
<body>

  <div class="bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <main class="page-404">
    <div class="err-code gradient-text mono">404</div>

    <div class="terminal glass">
      <div class="terminal-header">
        <span class="dot dot-red"></span>
        <span class="dot dot-yellow"></span>
        <span class="dot dot-green"></span>
        <span class="terminal-title mono">lucas@epita: ~</span>
      </div>
      <div class="terminal-body mono">
        <div><span class="t-prompt">lucas@epita:~$</span> <span class="t-cmd">cd <span id="path">/page</span></span></div>
        <div><span class="t-out">bash: cd: <span id="path2">/page</span>: No such file or directory</span></div>
        <div><span class="t-prompt">lucas@epita:~$</span> <span class="t-cmd">echo $?</span></div>
        <div><span class="t-out">404</span></div>
        <div><span class="t-prompt">lucas@epita:~$</span> <span class="t-cmd">cd ~</span> <span class="cursor-blink">▊</span></div>
      </div>
    </div>

    <a href="/" class="btn btn-primary mono" id="home-btn">cd ~ — retour à l'accueil</a>
  </main>

  <script>
    // affiche le chemin réellement demandé
    var p = window.location.pathname || "/page";
    document.getElementById("path").textContent = p;
    document.getElementById("path2").textContent = p;
    // langue mémorisée depuis le site principal
    if (localStorage.getItem("lang") === "en") {
      document.documentElement.lang = "en";
      document.title = "404 — command not found";
      document.getElementById("home-btn").textContent = "cd ~ — back home";
    }
  </script>
</body>
</html>
